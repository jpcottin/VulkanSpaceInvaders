name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Install NDK 29
        run: |
          set -o pipefail  # a failed sdkmanager must fail the step, not tail
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;29.0.14206865" 2>&1 | tail -3

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  # ── Native tests ─────────────────────────────────────────────────────────────
  test:
    name: Native Tests (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - api-level: 34
            gpu: swiftshader_indirect
          - api-level: 36
            gpu: auto

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Install NDK 29
        run: |
          set -o pipefail  # a failed sdkmanager must fail the step, not tail
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;29.0.14206865" 2>&1 | tail -3

      - name: Enable KVM for hardware-accelerated emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run native tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -gpu ${{ matrix.gpu }} -noaudio -no-boot-anim -verbose -show-kernel -debug-metrics -metrics-collection
          disable-animations: true
          emulator-boot-timeout: 900
          script: ./gradlew runNativeTests -PtestAbi=x86_64 --no-daemon

  # ── Smoke test: instrumented launch test + screenshot ─────────────────────────
  smoke:
    name: Smoke Test (API ${{ matrix.api-level }}${{ matrix.suffix && format(' {0}', matrix.suffix) || '' }})
    runs-on: ubuntu-latest
    # API 37.0 ps16k legs are preview images; run them non-blocking so a flaky
    # or unavailable preview emulator never gates a PR.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Stock x86_64 legs — these gate (blocking).
          - api-level: '34'
            gpu: swiftshader_indirect
          - api-level: '36'
            gpu: auto
          # API 37.x (16 KB page-size images); 4 GB RAM / 4 cores. channel
          # selects the emulator + image revision via sdkmanager --channel.
          - api-level: '37.0'
            suffix: stable-lavapipe
            target: google_apis_ps16k
            gpu: lavapipe
            ram-size: 4096M
            cores: 4
            disk-size: 8192M
            experimental: true
            extra-options: -no-snapshot -camera-back none -memory 4096 -delay-adb
          - api-level: '37.0'
            suffix: canary-lavapipe
            target: google_apis_ps16k
            channel: canary
            gpu: lavapipe
            ram-size: 4096M
            cores: 4
            disk-size: 8192M
            experimental: true
            extra-options: -no-snapshot -camera-back none -memory 4096 -delay-adb
          - api-level: '37.0'
            suffix: canary-auto
            target: google_apis_ps16k
            channel: canary
            gpu: auto
            ram-size: 4096M
            cores: 4
            disk-size: 8192M
            experimental: true
            extra-options: -no-snapshot -camera-back none -memory 4096 -delay-adb
          - api-level: '37.1'
            suffix: canary-lavapipe
            target: google_apis_ps16k
            channel: canary
            gpu: lavapipe
            ram-size: 4096M
            cores: 4
            disk-size: 8192M
            experimental: true
            extra-options: -no-snapshot -camera-back none -memory 4096 -delay-adb
          - api-level: '37.1'
            suffix: canary-auto
            target: google_apis_ps16k
            channel: canary
            gpu: auto
            ram-size: 4096M
            cores: 4
            disk-size: 8192M
            experimental: true
            extra-options: -no-snapshot -camera-back none -memory 4096 -delay-adb

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Install NDK 29
        run: |
          set -o pipefail  # a failed sdkmanager must fail the step, not tail
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;29.0.14206865" 2>&1 | tail -3

      - name: Enable KVM for hardware-accelerated emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # The runner image ships an outdated avdmanager that writes target=android-0
      # for minor-versioned packages (android-37.x); the emulator clamps that to
      # API 3 and skips the Vulkan/GLDirectMem auto-enable, which previously had
      # to be worked around with -feature GLDirectMem.
      - name: Update SDK cmdline-tools
        run: |
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --install "cmdline-tools;latest" > /dev/null
          # sdkmanager won't overwrite the preinstalled dir; it installs to latest-2.
          if [ -d "$SDK/cmdline-tools/latest-2" ]; then
            rm -rf "$SDK/cmdline-tools/latest"
            mv "$SDK/cmdline-tools/latest-2" "$SDK/cmdline-tools/latest"
          fi
          "$SDK/cmdline-tools/latest/bin/avdmanager" list device > /dev/null

      - name: Run instrumented smoke test and capture screenshot
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: ${{ matrix.target || 'default' }}
          channel: ${{ matrix.channel || 'stable' }}
          profile: pixel_6
          ram-size: ${{ matrix.ram-size }}
          cores: ${{ matrix.cores || 2 }}
          disk-size: ${{ matrix.disk-size }}
          emulator-options: -no-window -gpu ${{ matrix.gpu }} -noaudio -no-boot-anim -verbose -show-kernel -debug-metrics -metrics-collection ${{ matrix.extra-options || '' }}
          disable-animations: true
          emulator-boot-timeout: 900
          script: |
            adb wait-for-device
            ./gradlew connectedAndroidTest --no-daemon
            # The screenshot was captured INSIDE the passing test (verified
            # RESUMED + live swapchain) to /data/local/tmp, which survives the
            # post-test uninstall — no unverified relaunch needed.
            adb pull /data/local/tmp/smoke.png screenshot.png || true
            adb logcat -d SpaceInvaders:V AndroidRuntime:E *:S > logcat.txt || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-results-api${{ matrix.api-level }}${{ matrix.suffix && format('-{0}', matrix.suffix) || '' }}
          path: app/build/outputs/androidTest-results/
          if-no-files-found: warn

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-screenshot-api${{ matrix.api-level }}${{ matrix.suffix && format('-{0}', matrix.suffix) || '' }}
          path: screenshot.png
          if-no-files-found: warn

      - name: Upload logcat
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-logcat-api${{ matrix.api-level }}${{ matrix.suffix && format('-{0}', matrix.suffix) || '' }}
          path: logcat.txt
          if-no-files-found: warn

  # Experiment: drive the whole emulator flow with the new Android CLI
  # (https://d.android.com/tools/agents/android-cli) instead of
  # sdkmanager/avdmanager and the emulator-runner action.
  android-cli-experiment:
    name: Android CLI experiment (API 37.0 canary emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Install NDK 29
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;29.0.14206865" 2>&1 | tail -3

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Android CLI
        run: |
          curl -fsSL https://dl.google.com/android/cli/latest/linux_x86_64/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Android CLI diagnostics
        run: |
          android --version
          android info
          android sdk list | head -40

      - name: Install canary emulator and API 37.0 ps16k image with the CLI
        run: |
          android sdk install --canary emulator platform-tools system-images/android-37.0/google_apis_ps16k/x86_64
          android sdk list | grep -iE "^  emulator|android-37" || true

      # 'android emulator create' is profile-based with no way to pin an image (it
      # picks google_apis_playstore, whose first-boot Play overlays steal window
      # focus and break Espresso). An AVD is just ini files, so create the profile
      # with the CLI and retarget it at the pinned image — no sdkmanager/avdmanager.
      - name: Create AVD with the CLI and retarget it to API 37.0 ps16k
        run: |
          android emulator create medium_phone
          DEVICE="$(android emulator list | head -n1)"
          AVD_DIR="$HOME/.android/avd/$DEVICE.avd"
          if [ -z "$DEVICE" ] || [ ! -d "$AVD_DIR" ]; then
            echo "ERROR: created AVD not found (DEVICE='$DEVICE')"
            ls -la "$HOME/.android/avd/" || true
            exit 1
          fi
          echo "CLI created AVD: $DEVICE"
          CFG="$AVD_DIR/config.ini"
          # Replace-or-append so a key missing from the CLI-written config cannot
          # silently keep its profile default.
          set_ini() {
            if grep -q "^$1=" "$CFG"; then sed -i "s#^$1=.*#$1=$2#" "$CFG"; else echo "$1=$2" >> "$CFG"; fi
          }
          sed -i 's/^target=.*/target=android-37.0/' "$HOME/.android/avd/$DEVICE.ini"
          set_ini image.sysdir.1 'system-images/android-37.0/google_apis_ps16k/x86_64/'
          set_ini tag.id google_apis
          set_ini tag.display 'Google APIs'
          set_ini PlayStore.enabled false
          set_ini hw.ramSize 4096
          set_ini hw.cpu.ncore 4
          set_ini disk.dataPartition.size 8192M
          # Optional plural tag keys, if the profile wrote them, must not keep
          # claiming the playstore image.
          if grep -q '^tag.ids=' "$CFG"; then sed -i 's/^tag.ids=.*/tag.ids=google_apis,page_size_16kb/' "$CFG"; fi
          if grep -q '^tag.displaynames=' "$CFG"; then sed -i 's/^tag.displaynames=.*/tag.displaynames=Google APIs,16 KB Page Size/' "$CFG"; fi
          echo "===== root ini ====="; cat "$HOME/.android/avd/$DEVICE.ini"
          echo "===== config.ini ====="; cat "$CFG"
          echo "DEVICE=$DEVICE" >> "$GITHUB_ENV"

      # 'android emulator start' passes neither -noaudio nor -no-window, so the
      # runner needs libpulse and an X display.
      - name: Install emulator host dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libpulse0 xvfb
          Xvfb :99 -screen 0 1280x800x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"

      - name: Start emulator with the CLI
        timeout-minutes: 15
        run: |
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          export PATH="$SDK/platform-tools:$PATH"
          echo "Starting AVD: $DEVICE"
          # start returns 0 even if the emulator process dies; verify via adb.
          android emulator start --cold "$DEVICE"
          for _ in $(seq 1 30); do adb get-state >/dev/null 2>&1 && break; sleep 2; done
          adb get-state >/dev/null 2>&1 || { echo "===== emulator.log ====="; cat "$HOME/.android/$DEVICE/emulator.log" 2>/dev/null || echo "(no emulator.log)"; exit 1; }
          adb devices
          adb shell getprop ro.build.version.sdk
          adb shell getprop sys.boot_completed
          # The CLI has no disable-animations equivalent (emulator-runner sets it);
          # Espresso needs animations off.
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0
          adb logcat -v time > "${{ github.workspace }}/emulator_logcat.txt" &

      - name: Dump emulator.log on failure
        if: failure()
        run: cat "$HOME/.android/$DEVICE/emulator.log" 2>/dev/null || echo "(no emulator.log)"

      - name: Run instrumented tests
        run: ./gradlew connectedAndroidTest --no-daemon

      # Parity with the smoke job: the test captures a verified-swapchain
      # screenshot to /data/local/tmp; pull it and a filtered logcat.
      - name: Pull in-test screenshot and logcat
        if: always()
        run: |
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          export PATH="$SDK/platform-tools:$PATH"
          adb pull /data/local/tmp/smoke.png screenshot.png || true
          adb logcat -d SpaceInvaders:V AndroidRuntime:E *:S > logcat.txt || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cli-smoke-test-results
          path: app/build/outputs/androidTest-results/
          if-no-files-found: warn

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cli-smoke-screenshot
          path: screenshot.png
          if-no-files-found: warn

      - name: Upload logcat
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cli-smoke-logcat
          path: logcat.txt
          if-no-files-found: warn

      - name: Stop emulator
        if: always()
        run: android emulator stop "$DEVICE" || true

      - name: Dump logcat on failure
        if: failure()
        run: tail -n 500 "${{ github.workspace }}/emulator_logcat.txt" 2>/dev/null || echo "no logcat captured"

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: instrumented-test-report-android-cli-experiment
          path: app/build/reports/androidTests/

  # Experiment: run the new "Android Emulator (Preview)" package
  # (emulators;latest — a separate SDK package installing to emulators/latest/,
  # currently API 37+ only) by launching its binary directly; the emulator-runner
  # action hardcodes $SDK/emulator/emulator and cannot use it.
  emulator-preview-experiment:
    name: Emulator Preview experiment (emulators/latest, API 37.0)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Install NDK 29
        run: |
          set -o pipefail  # a failed sdkmanager must fail the step, not tail
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;29.0.14206865" 2>&1 | tail -3

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # The runner image ships an outdated avdmanager that writes target=android-0
      # for minor-versioned packages (android-37.x); the emulator clamps that to
      # API 3 and skips the Vulkan/GLDirectMem auto-enable the ps16k images need.
      - name: Update SDK cmdline-tools
        run: |
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --install "cmdline-tools;latest" > /dev/null
          # sdkmanager won't overwrite the preinstalled dir; it installs to latest-2.
          if [ -d "$SDK/cmdline-tools/latest-2" ]; then
            rm -rf "$SDK/cmdline-tools/latest"
            mv "$SDK/cmdline-tools/latest-2" "$SDK/cmdline-tools/latest"
          fi
          "$SDK/cmdline-tools/latest/bin/avdmanager" list device > /dev/null

      # The AVD must be created BEFORE emulators;latest is installed: with the
      # preview package's new-generation metadata in the SDK, avdmanager create
      # silently produces nothing (exit 0) — same trap as the Android CLI
      # packages.
      - name: Install API 37.0 ps16k image and create AVD
        run: |
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --channel=3 --install 'system-images;android-37.0;google_apis_ps16k;x86_64' platform-tools > /dev/null
          # Mimic the emulator-runner action's invocation (--abi and --device
          # skip the auto-select/prompt path where bare creates silently no-op).
          echo no | "$SDK/cmdline-tools/latest/bin/avdmanager" create avd --force -n test --abi 'google_apis_ps16k/x86_64' --device 'pixel_6' --package 'system-images;android-37.0;google_apis_ps16k;x86_64' 2>&1 || echo "avdmanager exit code: $?"
          if [ ! -d "$HOME/.android/avd/test.avd" ]; then
            echo "avdmanager produced nothing; writing the AVD ini files by hand"
            mkdir -p "$HOME/.android/avd/test.avd"
            printf 'avd.ini.encoding=UTF-8\npath=%s/.android/avd/test.avd\npath.rel=avd/test.avd\ntarget=android-37.0\n' "$HOME" > "$HOME/.android/avd/test.ini"
            cat > "$HOME/.android/avd/test.avd/config.ini" << 'CFG'
          AvdId=test
          avd.ini.displayname=test
          avd.ini.encoding=UTF-8
          abi.type=x86_64
          hw.cpu.arch=x86_64
          image.sysdir.1=system-images/android-37.0/google_apis_ps16k/x86_64/
          tag.id=google_apis
          tag.display=Google APIs
          PlayStore.enabled=no
          hw.lcd.density=420
          hw.lcd.width=1080
          hw.lcd.height=2400
          hw.keyboard=yes
          hw.gpu.enabled=yes
          hw.gpu.mode=auto
          disk.dataPartition.size=8192M
          hw.ramSize=4096
          hw.cpu.ncore=4
          CFG
            sed -i 's/^          //' "$HOME/.android/avd/test.avd/config.ini"
          fi
          test -d "$HOME/.android/avd/test.avd" || { echo "ERROR: AVD not created"; exit 1; }
          # avdmanager defaults are too small for the ps16k image (the manual
          # fallback already writes these keys).
          grep -q '^hw.ramSize=' "$HOME/.android/avd/test.avd/config.ini" || printf 'hw.ramSize=4096\nhw.cpu.ncore=4\ndisk.dataPartition.size=8192M\n' >> "$HOME/.android/avd/test.avd/config.ini"
          echo "===== AVD root ini ====="; cat "$HOME/.android/avd/test.ini"

      - name: Install preview emulator
        run: |
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --channel=3 --install 'emulators;latest' > /dev/null
          echo "===== preview emulator version ====="
          "$SDK/emulators/latest/emulator" -version | head -8 || true

      # The preview package's qemu links libpulse.so.0 at load time even with
      # -noaudio (its command line already uses -audiodev none); the runner
      # image doesn't ship it.
      - name: Install emulator host dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libpulse0

      - name: Boot preview emulator
        timeout-minutes: 12
        run: |
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          export ANDROID_HOME="$SDK" ANDROID_SDK_ROOT="$SDK"
          export PATH="$SDK/platform-tools:$PATH"
          # The binary lives outside $SDK/emulator, so the SDK root must be
          # explicit or it would resolve relative to emulators/.
          "$SDK/emulators/latest/emulator" @test -no-snapshot -no-window -gpu auto -noaudio -no-boot-anim -camera-back none -memory 4096 -verbose -show-kernel -debug-metrics -metrics-collection > "${{ github.workspace }}/emulator_stdout.txt" 2>&1 &
          EMU_PID=$!
          # Stream the emulator output live into the step log.
          tail -F "${{ github.workspace }}/emulator_stdout.txt" &
          TAIL_PID=$!
          # wait-for-device hangs forever if the emulator dies; poll the process.
          # Budgets (3 min device, 8 min boot) stay under the 12-min step timeout
          # so these labeled errors fire before the hard kill. Observed: device
          # ~15s, boot ~44s.
          for _ in $(seq 1 36); do
            kill -0 "$EMU_PID" 2>/dev/null || { echo "ERROR: emulator process exited early"; exit 1; }
            adb get-state >/dev/null 2>&1 && break
            sleep 5
          done
          adb get-state >/dev/null 2>&1 || { echo "ERROR: no device after 180s"; exit 1; }
          for _ in $(seq 1 48); do
            [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ] && break
            sleep 10
          done
          [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ] || { echo "===== boot timeout ====="; exit 1; }
          adb devices
          adb shell getprop ro.build.version.sdk
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0
          adb logcat -v time > "${{ github.workspace }}/emulator_logcat_full.txt" &
          # Stop streaming into later steps; post-boot output stays in the file.
          kill "$TAIL_PID" 2>/dev/null || true

      - name: Run instrumented tests
        run: ./gradlew connectedAndroidTest --no-daemon

      # Parity with the smoke job: the test captures a verified-swapchain
      # screenshot to /data/local/tmp; pull it and a filtered logcat.
      - name: Pull in-test screenshot and logcat
        if: always()
        run: |
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          export PATH="$SDK/platform-tools:$PATH"
          adb pull /data/local/tmp/smoke.png screenshot.png || true
          adb logcat -d SpaceInvaders:V AndroidRuntime:E *:S > logcat.txt || true

      - name: Stop emulator
        if: always()
        run: |
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          "$SDK/platform-tools/adb" emu kill || true

      - name: Dump emulator output on failure
        if: failure()
        run: |
          echo "===== emulator stdout (full) ====="; cat "${{ github.workspace }}/emulator_stdout.txt" 2>/dev/null || echo "(none)"
          echo "===== logcat (tail) ====="; tail -n 300 "${{ github.workspace }}/emulator_logcat_full.txt" 2>/dev/null || echo "(none)"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: preview-smoke-test-results
          path: app/build/outputs/androidTest-results/
          if-no-files-found: warn

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: preview-smoke-screenshot
          path: screenshot.png
          if-no-files-found: warn

      - name: Upload logcat
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: preview-smoke-logcat
          path: logcat.txt
          if-no-files-found: warn

  # Experiment: snapshot save/restore of a live Vulkan game on the preview
  # emulator. Three boot cycles WITHOUT -no-snapshot: each plays ~5s in
  # auto-play, screenshots, then kills gracefully (adb emu kill) so the
  # emulator saves a snapshot. If restore preserves the running app, the three
  # screenshots show progressively later game stages.
  emulator-preview-multirun:
    name: Emulator Preview experiment multi-run (emulators/latest, API 37.0)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Install NDK 29
        run: |
          set -o pipefail  # a failed sdkmanager must fail the step, not tail
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;29.0.14206865" 2>&1 | tail -3

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      # The runner image ships an outdated avdmanager that writes target=android-0
      # for minor-versioned packages (android-37.x); the emulator clamps that to
      # API 3 and skips the Vulkan/GLDirectMem auto-enable the ps16k images need.
      - name: Update SDK cmdline-tools
        run: |
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --install "cmdline-tools;latest" > /dev/null
          # sdkmanager won't overwrite the preinstalled dir; it installs to latest-2.
          if [ -d "$SDK/cmdline-tools/latest-2" ]; then
            rm -rf "$SDK/cmdline-tools/latest"
            mv "$SDK/cmdline-tools/latest-2" "$SDK/cmdline-tools/latest"
          fi
          "$SDK/cmdline-tools/latest/bin/avdmanager" list device > /dev/null

      # The AVD must be created BEFORE emulators;latest is installed (its
      # metadata makes avdmanager create silently no-op).
      - name: Install API 37.0 ps16k image and create AVD
        run: |
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --channel=3 --install 'system-images;android-37.0;google_apis_ps16k;x86_64' platform-tools > /dev/null
          echo no | "$SDK/cmdline-tools/latest/bin/avdmanager" create avd --force -n test --abi 'google_apis_ps16k/x86_64' --device 'pixel_6' --package 'system-images;android-37.0;google_apis_ps16k;x86_64' 2>&1 || echo "avdmanager exit code: $?"
          if [ ! -d "$HOME/.android/avd/test.avd" ]; then
            echo "avdmanager produced nothing; writing the AVD ini files by hand"
            mkdir -p "$HOME/.android/avd/test.avd"
            printf 'avd.ini.encoding=UTF-8\npath=%s/.android/avd/test.avd\npath.rel=avd/test.avd\ntarget=android-37.0\n' "$HOME" > "$HOME/.android/avd/test.ini"
            cat > "$HOME/.android/avd/test.avd/config.ini" << 'CFG'
          AvdId=test
          avd.ini.displayname=test
          avd.ini.encoding=UTF-8
          abi.type=x86_64
          hw.cpu.arch=x86_64
          image.sysdir.1=system-images/android-37.0/google_apis_ps16k/x86_64/
          tag.id=google_apis
          tag.display=Google APIs
          PlayStore.enabled=no
          hw.lcd.density=420
          hw.lcd.width=1080
          hw.lcd.height=2400
          hw.keyboard=yes
          hw.gpu.enabled=yes
          hw.gpu.mode=auto
          disk.dataPartition.size=8192M
          hw.ramSize=4096
          hw.cpu.ncore=4
          CFG
            sed -i 's/^          //' "$HOME/.android/avd/test.avd/config.ini"
          fi
          test -d "$HOME/.android/avd/test.avd" || { echo "ERROR: AVD not created"; exit 1; }
          grep -q '^hw.ramSize=' "$HOME/.android/avd/test.avd/config.ini" || printf 'hw.ramSize=4096\nhw.cpu.ncore=4\ndisk.dataPartition.size=8192M\n' >> "$HOME/.android/avd/test.avd/config.ini"

      - name: Install preview emulator
        run: |
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --channel=3 --install 'emulators;latest' > /dev/null
          "$SDK/emulators/latest/emulator" -version | head -8 || true

      # The preview package's qemu links libpulse.so.0 at load time.
      - name: Install emulator host dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libpulse0

      - name: Snapshot multi-run cycle
        timeout-minutes: 25
        run: |
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          export ANDROID_HOME="$SDK" ANDROID_SDK_ROOT="$SDK"
          export PATH="$SDK/platform-tools:$PATH"
          PKG=com.jpcottin.vulkanspaceinvaders
          mkdir -p "${{ github.workspace }}/screenshots"

          boot_and_play() {  # $1 = run number
            N="$1"
            echo "================ RUN $N: launching emulator (snapshots enabled) ================"
            # No -no-snapshot: load the snapshot if present, save on exit.
            "$SDK/emulators/latest/emulator" @test -no-window -gpu auto -noaudio -no-boot-anim -camera-back none -memory 4096 -verbose -show-kernel -debug-metrics -metrics-collection > "${{ github.workspace }}/emulator_run$N.txt" 2>&1 &
            EMU_PID=$!
            tail -F "${{ github.workspace }}/emulator_run$N.txt" &
            TAIL_PID=$!
            for _ in $(seq 1 36); do
              kill -0 "$EMU_PID" 2>/dev/null || { echo "ERROR: emulator process exited early (run $N)"; exit 1; }
              adb get-state >/dev/null 2>&1 && break
              sleep 5
            done
            adb get-state >/dev/null 2>&1 || { echo "ERROR: no device after 180s (run $N)"; exit 1; }
            for _ in $(seq 1 48); do
              [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ] && break
              sleep 10
            done
            [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ] || { echo "===== boot timeout (run $N) ====="; exit 1; }
            kill "$TAIL_PID" 2>/dev/null || true

            if [ "$N" = "1" ]; then
              adb install -r app/build/outputs/apk/debug/app-debug.apk
              # Enable auto-play BEFORE first app start: the game loads
              # <files>/settings.bin at startup (magic "SETT" LE, soundOn=0,
              # autoPlay=1). Base64 avoids adb shell quoting of binary escapes.
              adb shell "run-as $PKG sh -c 'mkdir -p files; echo VFRFUwAAAAABAAAA | base64 -d > files/settings.bin'"
              adb shell "run-as $PKG ls -l files/settings.bin"
              adb shell input keyevent KEYCODE_WAKEUP || true
              adb shell wm dismiss-keyguard || true
            fi

            # Start (or re-foreground, after a restored snapshot) the app; the
            # TITLE screen needs one tap to start a round — auto-play only
            # pilots during PLAYING.
            adb shell am start -n "$PKG/android.app.NativeActivity" || true
            # Input to an unfocused window is dropped, and cold Vulkan init can
            # take a few seconds: wait for the activity to hold window focus
            # before tapping past the TITLE screen.
            for _ in $(seq 1 30); do
              adb shell dumpsys window 2>/dev/null | grep -qi "ocus.*vulkanspaceinvaders" && break
              sleep 1
            done
            sleep 2
            adb shell input tap 540 1500 || true
            sleep 1
            adb shell input tap 540 1500 || true
            sleep 5
            adb exec-out screencap -p > "${{ github.workspace }}/screenshots/run$N.png" || true
            echo "RUN $N screenshot: $(stat -c %s "${{ github.workspace }}/screenshots/run$N.png" 2>/dev/null || echo 0) bytes"
            sleep 1
            echo "RUN $N: killing emulator gracefully (snapshot save expected)"
            adb emu kill || true
            # Snapshot save is a RAM dump and outlives the launcher: qemu keeps
            # the qcow2 write locks until it finishes, so wait for EVERY process
            # from the preview package (launcher, qemu, netsimd, crashpad) to
            # exit before relaunching.
            for _ in $(seq 1 120); do
              pgrep -f "emulators/latest" >/dev/null 2>&1 || break
              sleep 1
            done
            if pgrep -f "emulators/latest" >/dev/null 2>&1; then
              echo "WARNING: preview emulator processes still alive after 120s:"
              pgrep -af "emulators/latest" || true
              pkill -f "emulators/latest" || true
              sleep 5
            fi
            sleep 3
            echo "===== RUN $N snapshot-related emulator log lines ====="
            grep -inE "snapshot|quickboot" "${{ github.workspace }}/emulator_run$N.txt" | tail -15 || echo "(none)"
          }

          boot_and_play 1
          boot_and_play 2
          boot_and_play 3

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: preview-multirun-screenshots
          path: screenshots/
          if-no-files-found: warn

      - name: Upload emulator logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: preview-multirun-emulator-logs
          path: emulator_run*.txt
          if-no-files-found: warn
