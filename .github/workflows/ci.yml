name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Install NDK 29
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;29.0.14206865" 2>&1 | tail -3

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  # ── Native tests ─────────────────────────────────────────────────────────────
  test:
    name: Native Tests (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - api-level: 34
            gpu: swiftshader_indirect
          - api-level: 36
            gpu: auto

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Install NDK 29
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;29.0.14206865" 2>&1 | tail -3

      - name: Enable KVM for hardware-accelerated emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run native tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -gpu ${{ matrix.gpu }} -noaudio -no-boot-anim -verbose -debug-metrics -metrics-collection
          disable-animations: true
          emulator-boot-timeout: 900
          script: ./gradlew runNativeTests -PtestAbi=x86_64 --no-daemon

  # ── Smoke test: instrumented launch test + screenshot ─────────────────────────
  smoke:
    name: Smoke Test (API ${{ matrix.api-level }}${{ matrix.suffix && format(' {0}', matrix.suffix) || '' }})
    runs-on: ubuntu-latest
    # API 37.0 ps16k legs are preview images; run them non-blocking so a flaky
    # or unavailable preview emulator never gates a PR.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Stock x86_64 legs — these gate (blocking).
          - api-level: '34'
            gpu: swiftshader_indirect
          - api-level: '36'
            gpu: auto
          # API 37.0 (16 KB page-size image) across three GPU backends.
          # Needs the GLDirectMem feature; runs with 4 GB RAM / 4 cores.
          - api-level: '37.0'
            suffix: swiftshader
            target: google_apis_ps16k
            gpu: swiftshader_indirect
            ram-size: 4096M
            cores: 4
            disk-size: 8192M
            experimental: true
            extra-options: -no-snapshot -camera-back none -memory 4096 -delay-adb -show-kernel -feature GLDirectMem,HasSharedSlotsHostMemoryAllocator
          - api-level: '37.0'
            suffix: lavapipe
            target: google_apis_ps16k
            gpu: lavapipe
            ram-size: 4096M
            cores: 4
            disk-size: 8192M
            experimental: true
            extra-options: -no-snapshot -camera-back none -memory 4096 -delay-adb -show-kernel -feature GLDirectMem,HasSharedSlotsHostMemoryAllocator
          - api-level: '37.0'
            suffix: auto
            target: google_apis_ps16k
            gpu: auto
            ram-size: 4096M
            cores: 4
            disk-size: 8192M
            experimental: true
            extra-options: -no-snapshot -camera-back none -memory 4096 -delay-adb -show-kernel -feature GLDirectMem,HasSharedSlotsHostMemoryAllocator

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Install NDK 29
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;29.0.14206865" 2>&1 | tail -3

      - name: Enable KVM for hardware-accelerated emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented smoke test and capture screenshot
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: ${{ matrix.target || 'default' }}
          channel: ${{ matrix.channel || 'stable' }}
          profile: pixel_6
          ram-size: ${{ matrix.ram-size }}
          cores: ${{ matrix.cores || 2 }}
          disk-size: ${{ matrix.disk-size }}
          emulator-options: -no-window -gpu ${{ matrix.gpu }} -noaudio -no-boot-anim -verbose -debug-metrics -metrics-collection ${{ matrix.extra-options || '' }}
          disable-animations: true
          emulator-boot-timeout: 900
          script: |
            adb wait-for-device
            ./gradlew connectedAndroidTest --no-daemon
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb shell input keyevent KEYCODE_WAKEUP
            adb shell wm dismiss-keyguard
            adb shell am start -n com.jpcottin.vulkanspaceinvaders/android.app.NativeActivity
            for i in $(seq 1 15); do adb shell dumpsys window windows | grep -q "com.jpcottin.vulkanspaceinvaders" && break; sleep 1; done || true
            sleep 4
            adb exec-out screencap -p > screenshot.png || true
            adb logcat -d SpaceInvaders:V AndroidRuntime:E *:S > logcat.txt || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-results-api${{ matrix.api-level }}${{ matrix.suffix && format('-{0}', matrix.suffix) || '' }}
          path: app/build/outputs/androidTest-results/
          if-no-files-found: warn

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-screenshot-api${{ matrix.api-level }}${{ matrix.suffix && format('-{0}', matrix.suffix) || '' }}
          path: screenshot.png
          if-no-files-found: warn

      - name: Upload logcat
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-logcat-api${{ matrix.api-level }}${{ matrix.suffix && format('-{0}', matrix.suffix) || '' }}
          path: logcat.txt
          if-no-files-found: warn
